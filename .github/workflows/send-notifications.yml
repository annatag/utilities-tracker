name: Send due-date notifications

on:
  schedule:
    # GitHub Actions schedules run in UTC. 17:20 UTC is 12:20 PM EST / 1:20 PM EDT.
    - cron: "20 17 * * *"
  workflow_dispatch:

jobs:
  send-notifications:
    name: Send reminders
    runs-on: ubuntu-latest
    steps:
      - name: POST notification endpoint
        env:
          NOTIFICATION_BASE_URL: ${{ secrets.NOTIFICATION_BASE_URL }}
          NOTIFICATION_SECRET: ${{ secrets.NOTIFICATION_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${NOTIFICATION_BASE_URL}" ]; then
            echo "NOTIFICATION_BASE_URL secret is required."
            exit 1
          fi

          if [ -z "${NOTIFICATION_SECRET}" ]; then
            echo "NOTIFICATION_SECRET secret is required."
            exit 1
          fi

          base_url="${NOTIFICATION_BASE_URL%/}"
          headers=(
            -H "Authorization: Bearer ${NOTIFICATION_SECRET}"
            -H "Content-Type: application/json"
          )

          if [ -n "${CF_ACCESS_CLIENT_ID}" ] || [ -n "${CF_ACCESS_CLIENT_SECRET}" ]; then
            if [ -z "${CF_ACCESS_CLIENT_ID}" ] || [ -z "${CF_ACCESS_CLIENT_SECRET}" ]; then
              echo "Set both CF_ACCESS_CLIENT_ID and CF_ACCESS_CLIENT_SECRET, or leave both empty."
              exit 1
            fi
            headers+=(
              -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}"
              -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}"
            )
          fi

          response_file="$(mktemp)"
          status_code="$(curl --silent --show-error --location --retry 3 --retry-delay 5 \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            -X POST "${base_url}/api/notifications" \
            "${headers[@]}" \
            --data '{"source":"github-actions"}')"

          echo "Notification endpoint HTTP status: ${status_code}"
          cat "${response_file}"
          echo

          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            exit 1
          fi
